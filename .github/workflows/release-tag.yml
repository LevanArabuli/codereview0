# When a vX.Y.Z tag is pushed, force-update the matching major version tag
# (vX) so consumers using `uses: LevanArabuli/codereview0@v1` automatically
# get patch/minor updates. Standard pattern for marketplace actions.

name: release-tag

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  bump-major-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move major version tag
        env:
          REF: ${{ github.ref_name }}
        run: |
          set -eu
          major="${REF%%.*}"
          echo "Tag pushed: $REF -> moving $major to ${{ github.sha }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$major" "${{ github.sha }}"
          git push origin "$major" --force
