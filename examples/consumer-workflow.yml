# Copy this file to .github/workflows/codereview.yml in the repo where you want
# automated PR reviews. Then add ANTHROPIC_API_KEY to the repo's secrets.
#
# Triggers:
#   /codereview        - quick review (diff only)
#   /codereview deep   - deep review (clones repo, agentic cross-file analysis)

name: codereview

on:
  issue_comment:
    types: [created]

# Cancel an in-flight review if the same PR receives a new /codereview comment.
concurrency:
  group: codereview-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    # Only run on PR comments that start with "/codereview", AND only when the
    # commenter has write-equivalent access. Without this gate, anyone with a
    # GitHub account could drain your ANTHROPIC_API_KEY by commenting on a
    # public PR. On a private repo where every commenter is already trusted,
    # you can drop the author_association check.
    if: >-
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/codereview') &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write   # post the pending review
      issues: read           # read the triggering comment
      contents: read         # checkout in deep mode
    steps:
      - name: Parse /codereview command
        id: cmd
        env:
          BODY: ${{ github.event.comment.body }}
        run: |
          mode=quick
          # Match "/codereview deep" exactly (word-boundary after "deep" so "/codereview deeper" stays quick)
          if [[ "$BODY" =~ ^/codereview[[:space:]]+deep([[:space:]]|$) ]]; then
            mode=deep
          fi
          echo "mode=$mode" >> "$GITHUB_OUTPUT"

      - name: React to triggering comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

      - name: Run codereview
        # Pin to a specific tag (e.g. @v1.0.0) or major version (e.g. @v1) in real use.
        id: codereview
        uses: LevanArabuli/codereview0@main
        with:
          pr_url: ${{ github.event.issue.pull_request.html_url }}
          mode: ${{ steps.cmd.outputs.mode }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional:
          # model: sonnet
          # review_mode: balanced
          #
          # Custom Anthropic-compatible provider (LiteLLM, OpenRouter, self-hosted, etc.)
          # Use either anthropic_api_key OR anthropic_auth_token depending on what your
          # provider expects. anthropic_base_url overrides the default endpoint.
          # anthropic_base_url: https://your-proxy.example.com
          # anthropic_auth_token: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}

      - name: React with success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: '+1',
            });

      - name: React with failure on error
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: '-1',
            });

      - name: Post failure comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Strip ANSI color codes -- picocolors emits them, but they
            // render as garbage in markdown.
            const stripAnsi = (s) => s.replace(/\x1b\[[0-9;]*m/g, '');

            let headline = 'See logs for details.';
            let snippet = '';
            try {
              const raw = fs.readFileSync(
                path.join(process.env.RUNNER_TEMP, 'codereview.log'),
                'utf-8',
              );
              const log = stripAnsi(raw).trimEnd();
              const lines = log.split('\n');

              // Headline: scan from the END for the most recent line matching
              // a known error marker. Reverse order so a specific cause (e.g.
              // "claude CLI exited with code 1: ...") wins over a generic
              // earlier header ("Analysis failed"). Fall back to the last
              // non-empty line.
              const markerRe = /^(✖|Analysis failed|Deep review failed|claude CLI exited|Error[:\s]|Warning:|::error)/i;
              let markerLine = '';
              for (let i = lines.length - 1; i >= 0; i--) {
                if (markerRe.test(lines[i].trim())) {
                  markerLine = lines[i].trim();
                  break;
                }
              }
              headline = (markerLine || lines.filter(Boolean).pop() || headline).trim();
              // Cap headline length so it stays readable in the comment.
              if (headline.length > 200) headline = headline.slice(0, 200) + '…';

              // Detail: last ~20 lines for context.
              snippet = lines.slice(-20).join('\n');
            } catch {
              // log file missing -- action failed before the run step started
              // (e.g. validation step, npm install). headline stays generic.
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `**codereview failed:** ${headline}`,
              '',
              '<details><summary>Last output</summary>',
              '',
              '```',
              snippet || '(no log captured)',
              '```',
              '',
              '</details>',
              '',
              `[Full logs](${runUrl})`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
